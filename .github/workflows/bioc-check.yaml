name: BiocCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bioc-check:
    runs-on: ubuntu-latest
    # Bioconductor review runs on R devel; match that environment.
    name: BiocCheck (R devel)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: sudo apt-get install -y qpdf

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: devel
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::BiocManager
          needs: check

      - name: Install BiocCheck
        run: BiocManager::install("BiocCheck", ask = FALSE, update = FALSE)
        shell: Rscript {0}

      - name: Build package tarball
        run: |
          pkg <- pkgbuild::build(".", dest_path = tempdir(), vignettes = TRUE)
          cat("::set-output name=tarball::", pkg, "\n", sep = "")
        shell: Rscript {0}

      - name: R CMD check (devel baseline)
        uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'

      - name: Run BiocCheck
        run: |
          pkg_dir <- "."
          BiocCheck::BiocCheck(
            pkg_dir,
            `new-package`        = TRUE,
            `no-check-R-ver`     = FALSE,
            `no-check-bioc-help` = TRUE,
            `no-check-version-num` = FALSE
          )
        shell: Rscript {0}
